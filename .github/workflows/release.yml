name: Release
on:
  workflow_dispatch:

jobs:
  prepare_release:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    outputs:
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_id: ${{ steps.release.outputs.release_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync node version and setup cache
        uses: pnpm/action-setup@v6
        with:
          version: 8

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Derive release tag from repo version files
        id: version
        run: |
          echo "tag_name=$(node scripts/bump-release-version.mjs --print-tag)" >> "$GITHUB_OUTPUT"

      - name: Fail if release tag already exists
        run: |
          git fetch --force --tags origin
          if git show-ref --tags --verify --quiet "refs/tags/${{ steps.version.outputs.tag_name }}"; then
            echo "Release tag already exists: ${{ steps.version.outputs.tag_name }}"
            exit 1
          fi

      - name: Create draft release
        id: release
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagName = '${{ steps.version.outputs.tag_name }}';
            const response = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              target_commitish: context.sha,
              name: `Marker ${tagName}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true,
            });
            core.setOutput('release_id', String(response.data.id));

  build_release:
    needs: prepare_release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        # Remove libappindicator3-dev if the app does not use a system tray.
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Sync node version and setup cache
        uses: pnpm/action-setup@v6
        with:
          version: 8

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.prepare_release.outputs.release_id }}
          tagName: ${{ needs.prepare_release.outputs.tag_name }}
          includeUpdaterJson: false
